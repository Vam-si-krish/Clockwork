  <!-- Major ticks -->
  <line x1="20" y1="2.5" x2="20" y2="7" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
  <line x1="37.5" y1="20" x2="33" y2="20" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="37.5" x2="20" y2="33" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
  <line x1="2.5" y1="20" x2="7" y2="20" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
  <!-- Minor ticks -->
  <line x1="28.75" y1="4.84" x2="27.75" y2="6.58" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="35.16" y1="11.25" x2="33.42" y2="12.25" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="35.16" y1="28.75" x2="33.42" y2="27.75" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="28.75" y1="35.16" x2="27.75" y2="33.42" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="11.25" y1="35.16" x2="12.25" y2="33.42" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="4.84" y1="28.75" x2="6.58" y2="27.75" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="4.84" y1="11.25" x2="6.58" y2="12.25" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="11.25" y1="4.84" x2="12.25" y2="6.58" stroke="#E8A020" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Hour hand — 10 o'clock -->
